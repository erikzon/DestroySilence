<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DestroySilence</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="DestroySilence.styles.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="js/threeBackground.js"></script>
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script>
        window.descargarVideo = (fileName, url) => {
            const anchorElement = document.createElement('a');
            anchorElement.href = url;
            anchorElement.download = fileName;
            document.body.appendChild(anchorElement);
            anchorElement.click();
            anchorElement.remove();
        }
    </script>
    <script>
        window.audioVisualizer = {
            audioDataDb: [],
            thresholdDb: -30,
            // Función para dibujar el canvas (se puede llamar varias veces para mover la línea roja)
            draw: function (canvasId, thresholdDb) {
                this.thresholdDb = thresholdDb;
                const canvas = document.getElementById(canvasId);
                if (!canvas) return;

                const dpr = window.devicePixelRatio || 1;
                const cssWidth = canvas.offsetWidth;
                const cssHeight = canvas.offsetHeight;

                canvas.style.width = canvas.style.width || canvas.width + 'px';
                canvas.style.height = canvas.style.height || canvas.height + 'px';

                canvas.width = cssWidth * dpr;
                canvas.height = cssHeight * dpr;

                const ctx = canvas.getContext('2d');
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                const width = canvas.width;
                const height = canvas.height;

                ctx.clearRect(0, 0, width, height);

                // Dibujar el fondo
                ctx.fillStyle = '#1e1e1e';
                ctx.fillRect(0, 0, width, height);

                // Mapear decibelios (de -60dB a 0dB) a la altura del canvas
                const minDb = -60;
                const getH = (db) => {
                    let clamped = Math.max(minDb, Math.min(0, db));
                    return height - ((clamped - minDb) / (0 - minDb)) * height;
                };

                // Dibujar el waveform (barras)
                const barWidth = width / this.audioDataDb.length;
                ctx.fillStyle = '#4CAF50'; // Verde estilo consola
                for (let i = 0; i < this.audioDataDb.length; i++) {
                    const y = getH(this.audioDataDb[i]);
                    ctx.fillRect(i * barWidth, y, barWidth - 1, height - y);
                }

                // Dibujar la línea de umbral (Threshold)
                const thresholdY = getH(this.thresholdDb);
                ctx.strokeStyle = '#FF3B30'; // Rojo advertencia
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(0, thresholdY);
                ctx.lineTo(width, thresholdY);
                ctx.stroke();

                // Etiqueta de texto para la línea
                ctx.fillStyle = '#FFF';
                ctx.font = '12px Arial';
                ctx.fillText(`${this.thresholdDb} dB`, 5, thresholdY - 5);
            },

            // Función pesada: decodifica el archivo y calcula los decibelios
            generate: async function (inputElementOrId, canvasId, thresholdDb) {
                let inputElement = inputElementOrId;
                if (typeof inputElementOrId === 'string') {
                    inputElement = document.getElementById(inputElementOrId);
                }
                console.log('audioVisualizer.generate:', inputElementOrId, inputElement);
                if (!inputElement || !inputElement.files || inputElement.files.length === 0) return;
                const file = inputElement.files[0];
                const url = URL.createObjectURL(file); // Carga instantánea sin usar RAM de C#

                try {
                    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    const response = await fetch(url);
                    const arrayBuffer = await response.arrayBuffer();
                    const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);

                    const channelData = audioBuffer.getChannelData(0); // Tomamos el canal izquierdo
                    const buckets = 150; // Cantidad de barras a dibujar
                    const bucketSize = Math.floor(channelData.length / buckets);

                    this.audioDataDb = [];

                    for (let i = 0; i < buckets; i++) {
                        let sumSquares = 0;
                        for (let j = 0; j < bucketSize; j++) {
                            let val = channelData[i * bucketSize + j];
                            sumSquares += val * val;
                        }
                        let rms = Math.sqrt(sumSquares / bucketSize);
                        let db = 20 * Math.log10(rms);
                        if (!isFinite(db)) db = -100; // Silencio absoluto
                        this.audioDataDb.push(db);
                    }

                    this.draw(canvasId, thresholdDb);
                } catch (e) {
                    console.error("Error visualizando audio:", e);
                } finally {
                    URL.revokeObjectURL(url);
                }
            },
            registerResize: function(canvasId) {
                // Limpiar listener anterior si existe
                if (this._resizeHandler) {
                    window.removeEventListener('resize', this._resizeHandler);
                }
                
                this._resizeHandler = debounce(() => {
                    this.draw(canvasId, this.thresholdDb);
                }, 150);
                
                window.addEventListener('resize', this._resizeHandler);
            },

            unregisterResize: function() {
                if (this._resizeHandler) {
                    window.removeEventListener('resize', this._resizeHandler);
                    this._resizeHandler = null;
                }
            },
        };

        function debounce(fn, delay) {
            let timer;
            return function (...args) {
                clearTimeout(timer);
                timer = setTimeout(() => fn(...args), delay);
            };
        }
    </script>
</body>

</html>
